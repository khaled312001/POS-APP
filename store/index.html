<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1226;
      color: #fff;
    }

    .card {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 16px;
      background: rgba(24, 30, 60, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 16px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #2fd3c6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .copy {
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.5;
      font-size: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" aria-hidden="true"></div>
    <div class="title" id="title">Loading store...</div>
    <div class="copy" id="copy">Preparing your menu and storefront.</div>
  </div>
  <script>
    (async function () {
      const path = window.location.pathname.replace(/^\/store\/?/, "").replace(/\/+$/, "");
      const slug = path.split("/")[0];
      const titleEl = document.getElementById("title");
      const copyEl = document.getElementById("copy");

      if (!slug) {
        titleEl.textContent = "Store not found";
        copyEl.textContent = "This store link is incomplete.";
        return;
      }

      try {
        const response = await fetch("/api/store/" + encodeURIComponent(slug), {
          credentials: "same-origin",
          cache: "no-store",
        });

        if (!response.ok) {
          throw new Error("Store responded with " + response.status);
        }

        const html = await response.text();
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error("[store-loader]", error);
        titleEl.textContent = "Store unavailable";
        copyEl.textContent = "We could not load this restaurant right now. Please try again in a moment.";
      }
    })();
  </script>
</body>
</html>
